name: Forkful Actions
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Linter
        run: bunx eslint .
      - name: Run Vitest
        run: bunx vitest run --changed=origin/main

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forkful_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Push Database Schema
        run: bun run db:push
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/forkful_test
      - name: Run Integration Tests
        run: bunx vitest run --config vitest.integration.config.ts --changed=origin/main
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forkful_test
          NODE_ENV: test
          JWT_SECRET: testsecret
