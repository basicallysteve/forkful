<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Forkful logo with a fork wearing glasses">
  <defs>
    <linearGradient id="forkful-icon-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <radialGradient id="forkful-icon-shine" cx="28%" cy="22%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <g transform="translate(14,12) scale(1.25)">
    <!-- Background -->
    <rect width="64" height="64" rx="16" fill="url(#forkful-icon-bg)" />
    <rect width="64" height="64" rx="16" fill="url(#forkful-icon-shine)" />
    <!-- Fork: 3 tines + crossbar + stem -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 10v13M32 10v13M40 10v13" />
      <path d="M24 19h16" />
      <path d="M32 23v23" />
    </g>
    <!-- Glasses circles + bridge -->
    <g fill="none" stroke="#a7f3d0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="34" r="7" />
      <circle cx="40" cy="34" r="7" />
      <path d="M31 34h9" />
    </g>
    <!-- Earpieces -->
    <path d="M17 34h7M47 34h-7" stroke="#6ee7b7" stroke-width="2.2" stroke-linecap="round" />
    <!-- Nose -->
    <path d="M32 46c2.3 0 4 1.5 4 3.2s-1.7 3.2-4 3.2-4-1.5-4-3.2 1.7-3.2 4-3.2z" fill="#d1fae5" opacity="0.88" />
  </g>
</svg>
